[package]
name = "puniyu_macros"
version = "0.8.3"
description = "puniyu crate for proc-macro"
readme = "README.md"
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true

[lib]
proc-macro = true

[dependencies]
convert_case = { version = "0.11.0" }
croner = { version = "3.0.1" }
proc-macro2 = { version = "1.0.106" }
quote = { version = "1.0.45" }
syn = { version = "2", features = ["full"] }

[dev-dependencies]
puniyu_adapter = { path = "../puniyu_adapter" }
puniyu_context = { version = "0.8.2" }
puniyu_plugin = { path = "../puniyu_plugin" }
serde.workspace = true
trybuild = { version = "1.0.116" }
