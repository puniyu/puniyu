[package]
name = "puniyu_config"
version = "0.7.8"
description = "puniyu 配置管理库，统一应用、Bot、群聊与好友配置读取与热重载"
readme = "README.md"
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
toml.workspace = true
puniyu_logger.workspace = true
serde.workspace = true
sugar_path.workspace = true
serde_repr.workspace = true

puniyu_path.workspace = true
puniyu_common.workspace = true

puniyu_error = { workspace = true, features = ["config", "registry"] }
notify-debouncer-full = { version = "0.7.0", features = ["flume"] }
