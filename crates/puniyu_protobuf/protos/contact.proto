syntax = "proto3";

package puniyu.contact;

enum SceneType {
  Friend = 0;
  Group = 1;
  GroupTemp = 2;
  Guild = 3;
}

message FriendContact {
  string peer = 1;
  optional string name = 2;
}

message GroupContact {
  string peer = 1;
  optional string name = 2;
}

message GroupTempContact {
  string peer = 1;
  optional string name = 2;
}

message GuildContact {
  string peer = 1;
  optional string name = 2;
  optional string sub_name = 3;
}

message Contact {
  oneof contact_type {
    FriendContact friend_contact = 1;
    GroupContact group_contact = 2;
    GroupTempContact group_temp_contact = 3;
    GuildContact guild_contact = 4;
  }
}