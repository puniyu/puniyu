syntax = "proto3";

package puniyu.adapter;

import "version.proto";

enum AdapterPlatform {
  QQ = 0;
  WECHAT = 1;
  TELEGRAM = 2;
  DISCORD = 3;
  KOOK = 4;
  PLATFORM_OTHER = 5;
}

enum AdapterStandard {
  ONE_BOT_V11 = 0;
  ONE_BOT_V12 = 1;
  OICQ = 2;
  ADAPTER_STANDARD_ICQQ = 3;
  STANDARD_OTHER = 4;
  MILKY = 5;
  SATORI = 6;
}

enum AdapterProtocol {
  QQ_BOT = 0;
  ADAPTER_PROTOCOL_OICQ = 1;
  ADAPTER_PROTOCOL_ICQQ = 2;
  GO_CQ_HTTP = 3;
  NAP_CAT = 4;
  LL_ONE_BOT = 5;
  CONWECHAT = 6;
  LAGRANGE = 7;
  CONSOLE = 8;
  ADAPTER_PROTOCOL_OTHER = 9;
  YOGURT = 10;
}

enum AdapterCommunication {
  HTTP = 0;
  WEB_SOCKET_SERVER = 1;
  WEB_SOCKET_CLIENT = 2;
  GRPC = 3;
  ADAPTER_COMMUNICATION_OTHER = 4;
  SSE = 5;
}

message AdapterInfo {
  string name = 1;
  puniyu.version.Version version = 2;
  AdapterPlatform platform = 3;
  AdapterStandard standard = 4;
  AdapterProtocol protocol = 5;
  AdapterCommunication communication = 6;
  optional string address = 7;
  uint64 connect_time = 8;
  optional string secret = 9;
  optional string author = 10;
}