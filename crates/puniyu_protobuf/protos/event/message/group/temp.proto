syntax = "proto3";

package puniyu.event.message.group.temp;
import "element/receive.proto";
import "element/send.proto";
import "contact.proto";
import "sender.proto";

message GroupTempMessageReceive {
  string event_id = 1;
  uint64 time = 2;
  string self_id = 3;
  string user_id = 4;
  string message_id = 5;
  repeated puniyu.element.receive.Elements elements = 6;
  puniyu.contact.GroupTempContact contact = 7;
  puniyu.sender.GroupTempSender sender = 8;
}

message GroupTempMessageSend {
  string event_id = 1;
  uint64 time = 2;
  string self_id = 3;
  string user_id = 4;
  string message_id = 5;
  repeated puniyu.element.send.Elements elements = 6;
  puniyu.contact.GroupTempContact contact = 7;
  puniyu.sender.GroupTempSender sender = 8;
}
