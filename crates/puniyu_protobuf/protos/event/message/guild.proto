syntax = "proto3";

package puniyu.event.message.guild;
import "element/receive.proto";
import "element/send.proto";
import "contact.proto";
import "sender.proto";
import "bot.proto";

message GuildMessage {
  string event_id = 1;
  uint64 time = 2;
  string self_id = 3;
  string user_id = 4;
  string message_id = 5;
  puniyu.bot.BotInfo bot = 6;
  repeated puniyu.element.receive.Elements elements = 7;
  puniyu.contact.GuildContact contact = 8;
  puniyu.sender.GuildSender sender = 9;
}
