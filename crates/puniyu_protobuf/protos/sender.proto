syntax = "proto3";

package puniyu.sender;

enum Sex {
  MALE = 0;
  FEMALE = 1;
  SEX_UNKNOWN = 2;
}

enum Role {
    OWNER = 0;
    ADMIN = 1;
    MEMBER = 2;
    ROLE_UNKNOWN = 3;
}
message FriendSender {
  string user_id = 1;
  optional string nick = 2;
  Sex sex = 3;
  optional uint32 age = 4;
}

message GroupSender {
  string user_id = 1;
  optional string nick = 2;
  Sex sex = 4;
  optional uint32 age = 5;
  Role role = 6;
  optional string card = 7;
  optional uint32 level = 8;
  optional string title = 9;
}

message GroupTempSender {
  string user_id = 1;
  optional string nick = 2;
  Sex sex = 4;
  optional uint32 age = 5;
  Role role = 6;
  optional string card = 7;
  optional uint32 level = 8;
  optional string title = 9;
}

message GuildSender {
  string user_id = 1;
  optional string nick = 2;
  Sex sex = 4;
  optional uint32 age = 5;
  Role role = 6;
  optional string card = 7;
  optional uint32 level = 8;
  optional string title = 9;
}

message SenderType {
  oneof sender_type {
    FriendSender friend_sender = 1;
    GroupSender group_sender = 2;
    GroupTempSender group_temp_sender = 3;
    GuildSender guild_sender = 4;
  }
}