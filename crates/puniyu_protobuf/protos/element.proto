syntax = "proto3";

package puniyu.element;

enum ElementType {
    /// 艾特元素
    AT = 0;
    /// 回复元素
    REPLY = 1;
    /// 文本元素
    TEXT = 2;
    /// 图片元素
    IMAGE = 3;
    /// 文件元素
    FILE = 4;
    /// 语音元素
    RECORD = 5;
    /// 视频元素
    VIDEO = 6;
    /// 表情元素
    FACE = 7;
    /// json元素
    JSON = 8;
    /// xml元素
    XML = 9;
}
