[package]
name = "puniyu_core"
version = "0.7.9"
description = "puniyu 的核心模块，包含基础设施和通用功能"
readme = "README.md"
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
bytes.workspace = true
tokio.workspace = true
convert_case.workspace = true
puniyu_version.workspace = true
puniyu_common.workspace = true
puniyu_path.workspace = true

puniyu_dispatch.workspace = true
const-str.workspace = true

figlet-rs = "0.1.5"

puniyu_config = { workspace = true, features = ["registry", "watcher"] }
puniyu_error = { workspace = true, features = ["registry"] }
puniyu_bot = { workspace = true, features = ["registry"] }
puniyu_hook = { workspace = true, features = ["registry"] }
puniyu_command = { workspace = true, features = ["registry"] }
puniyu_task = { workspace = true, features = ["registry"] }
puniyu_plugin = { workspace = true, features = ["registry"] }
puniyu_loader = { workspace = true, features = ["registry"] }
puniyu_handler = { workspace = true, features = ["registry"] }
puniyu_adapter = { workspace = true, features = ["registry"] }
puniyu_server = { workspace = true, features = ["registry"], optional = true }


[build-dependencies]
vergen-git2 = { version = "9.1.0", features = ["build"] }

[features]
default = ["server"]
server = ["dep:puniyu_server"]
