[package]
name = "puniyu_loader"
version = "0.7.8"
description = "Puniyu 加载器类型定义库，提供插件加载器的统一类型系统和注册管理"
authors.workspace = true
license.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
puniyu_plugin_core.workspace = true

puniyu_error = { workspace = true, features = ["registry"], optional = true }

[features]
default = []
registry = ["dep:puniyu_error"]

[dev-dependencies]
puniyu_plugin_core.workspace = true
