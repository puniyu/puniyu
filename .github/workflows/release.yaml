name: release
on:
  push:
    branches:
      - main
  pull_request_target:
  workflow_dispatch:

env:
  APP_NAME: puniyu

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  release:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs['puniyu--tag_name'] }}
      puniyu: ${{ steps.release-please.outputs['puniyu--release_created'] }}
      puniyu_adapter: ${{ steps.release-please.outputs['crates/puniyu_adapter--release_created'] }}
      puniyu_plugin: ${{ steps.release-please.outputs['crates/puniyu_plugin--release_created'] }}
      puniyu_macros: ${{ steps.release-please.outputs['crates/puniyu_macros--release_created'] }}
      puniyu_handler_command: ${{ steps.release-please.outputs['crates/puniyu_handler_command--release_created'] }}
      puniyu_handler_hook: ${{ steps.release-please.outputs['crates/puniyu_handler_hook--release_created'] }}
      puniyu_cooldown: ${{ steps.release-please.outputs['crates/puniyu_cooldown--release_created'] }}
      puniyu_protobuf: ${{ steps.release-please.outputs['crates/puniyu_protobuf--release_created'] }}
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 运行 release-please-action
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    uses: ./.github/workflows/build.yaml

  publish-lib:
    needs: [release]
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
    steps:
      - name: 检出代码
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 rust
        uses: puniyu/setup-rust@4dd24cb5a9898a12988cf2b076ddb8f1f48ffc19 # main
        with:
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 发布 puniyu_macros
        if: ${{ needs.release.outputs.puniyu_macros == 'true' }}
        run: cargo publish -p puniyu_macros

      - name: 发布 puniyu_cooldown
        if: ${{ needs.release.outputs.puniyu_cooldown == 'true' }}
        run: cargo publish -p puniyu_cooldown

      - name: 发布 puniyu_protobuf
        if: ${{ needs.release.outputs.puniyu_protobuf == 'true' }}
        run: cargo publish -p puniyu_protobuf

      - name: 发布 puniyu_handler_hook
        if: ${{ needs.release.outputs.puniyu_handler_hook == 'true' }}
        run: cargo publish -p puniyu_handler_hook

      - name: 发布 puniyu_handler_command
        if: ${{ needs.release.outputs.puniyu_handler_command == 'true' }}
        run: cargo publish -p puniyu_handler_command

      - name: 发布 puniyu_adapter
        if: ${{ needs.release.outputs.puniyu_adapter == 'true' }}
        run: cargo publish -p puniyu_adapter

      - name: 发布 puniyu_plugin
        if: ${{ needs.release.outputs.puniyu_plugin == 'true' }}
        run: cargo publish -p puniyu_plugin

  publish-to-release:
    needs: [release, build]
    if: ${{ needs.release.outputs.puniyu == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: puniyu-*
          merge-multiple: true
          path: .

      - name: 上传Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: |
            puniyu-*
  