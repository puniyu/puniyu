name: release
on:
  push:
    branches:
      - main
  pull_request_target:
  workflow_dispatch:

env:
  APP_NAME: puniyu

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !github.event.pull_request }}
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.release-plz.outputs.prs_created }}
      core: ${{ steps.release-plz.outputs.core }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0

      - name: 获取token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 运行 release-please-action
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 检查是否需要运行 release-plz
        id: check-release
        run: |
          if [[
            "${{ steps.release-please.outputs['crates/puniyu_adapter--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_plugin--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_macros--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_handler_command--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_handler_hook--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_cooldown--release_created'] }}" == "true" ||
            "${{ steps.release-please.outputs['crates/puniyu_protobuf--release_created'] }}" == "true"
          ]]; then
            echo "run_release_plz=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_release_plz=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 运行 release-plz
        if: ${{ steps.check-release.outputs.run_release_plz == 'true' }}
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}
