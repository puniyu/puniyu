name: Binaries

on:
  release:
    types: [published]

env:
  APP_NAME: puniyu


jobs:
  build_windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 

      - name: 设置 rust
        uses: puniyu/setup-rust@507862eea7197a8e6a9e8693e4b9437f880abdb1 # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --release --bin ${{ env.APP_NAME }} --target ${{ matrix.platform.target }}
          
      - name: 创建存档文件
        uses: a7ul/tar-action@ed9cbd44fc9276db29ea2fb1f8adf3d7e0691589 # v1.2.0
        with:
          command: c
          files: |
            ./target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}.exe
          outPath: ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

  build_macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 

      - name: 设置 rust
        uses: puniyu/setup-rust@507862eea7197a8e6a9e8693e4b9437f880abdb1 # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --release --bin ${{ env.APP_NAME }} --target ${{ matrix.platform.target }}
          
      - name: 创建存档文件
        uses: a7ul/tar-action@ed9cbd44fc9276db29ea2fb1f8adf3d7e0691589 # v1.2.0
        with:
          command: c
          files: |
            ./target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}
          outPath: ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

  build_linux:
    runs-on: ${{ matrix.platform.runner }}
    container: ${{ matrix.platform.container }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            container: ghcr.io/puniyu/debian:latest
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            container: ghcr.io/puniyu/debian:arm64

    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 

      - name: 设置 rust
        uses: puniyu/setup-rust@507862eea7197a8e6a9e8693e4b9437f880abdb1 # main
        with:
          target: ${{ matrix.platform.target }}
          cache: true
          prefix-key: ${{ env.APP_NAME }}

      - name: 构建
        run: |
          cargo build --release --bin ${{ env.APP_NAME }} --target ${{ matrix.platform.target }}


      - name: 创建存档文件
        uses: a7ul/tar-action@ed9cbd44fc9276db29ea2fb1f8adf3d7e0691589 # v1.2.0
        with:
          command: c
          files: |
            ./target/${{ matrix.platform.target }}/release/${{ env.APP_NAME }}
          outPath: ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

      - name: 上传构建产物
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ env.APP_NAME }}-${{ matrix.platform.target }}"
          path: |
            ${{ env.APP_NAME }}-${{ matrix.platform.target }}.tar.gz

  publish-to-release:
    needs: [build_windows, build_macos, build_linux]
    runs-on: ubuntu-latest
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: puniyu-*
          merge-multiple: true
          path: .

      - name: 上传Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            puniyu-*