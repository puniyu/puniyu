[workspace]
members = [
    "crates/*"
, "puniyu"]
resolver = "2"

[workspace.lints.clippy]
unwrap_used = "deny"

[workspace.package]
authors = ["wuliya <3369906077@qq.com>"]
license = "LGPL-3.0-only"
readme = "README.md"
homepage = "https://github.com/puniyu/puniyu"
repository = "https://github.com/puniyu/puniyu"
edition = "2024"
rust-version = "1.88.0"

[workspace.dependencies]
chrono = { version = "0.4.42", features = ["serde"] }
tokio = { version = "1.47.1" }
serde = { version = "1.0", features = ["derive"] }
serde_repr = { version = "0.1" }
serde_json = { version = "1.0" }
glob = { version = "0.3.3" }
toml = { version = "1.0.0" }
itertools = { version = "0.14.0" }
futures = { version = "0.3.31" }
async-trait = { version = "0.1.89" }
thiserror = { version = "2.0.17" }
inventory = { version = "0.3.21" }
strum = { version = "0.27.2", features = ["derive"] }
convert_case = { version = "0.11.0" }
clap = { version = "4.5", default-features = false, features = ["std"] }
actix-web = { version = "4.11.0" }
reqwest = { version = "0.13.0", default-features = false, features = [
    "json",
    "rustls",
] }
derive_builder = { version = "0.20.2" }
derive_more = { version = "2.1.1" }
bytes = { version = "1.11.0", features = ["serde"] }
prost = { version = "0.14.1" }

puniyu_logger = { version = "0.7.0" }
puniyu_system_info = { version = "1.5.5" }

puniyu_error = { version = "0.7.8", path = "./crates/puniyu_error", default-features = false }
puniyu_common = { version = "0.7.8", path = "./crates/puniyu_common", default-features = false }
puniyu_element = { version = "0.7.8", path = "./crates/puniyu_element" }
puniyu_message = { version = "0.7.8", path = "./crates/puniyu_message" }
puniyu_segment = { version = "0.7.8", path = "./crates/puniyu_segment" }
puniyu_contact = { version = "0.7.8", path = "./crates/puniyu_contact" }
puniyu_sender = { version = "0.7.8", path = "./crates/puniyu_sender" }
puniyu_account = { version = "0.7.8", path = "./crates/puniyu_account" }
puniyu_version = { version = "0.7.8", path = "./crates/puniyu_version" }
puniyu_path = { version = "0.7.8", path = "./crates/puniyu_path" }
puniyu_config = { version = "0.7.8", path = "./crates/puniyu_config" }
puniyu_event = { version = "0.7.8", path = "./crates/puniyu_event" }
puniyu_dispatch = { version = "0.7.8", path = "./crates/puniyu_dispatch" }
puniyu_context = { version = "0.7.8", path = "./crates/puniyu_context" }

puniyu_adapter = { version = "0.7.8", path = "./crates/puniyu_adapter" }
puniyu_adapter_core = { version = "0.7.8", path = "./crates/puniyu_adapter_core" }

puniyu_bot = { version = "0.7.8", path = "./crates/puniyu_bot" }

puniyu_command_core = { version = "0.7.8", path = "./crates/puniyu_command_core" }
puniyu_command_parser = { version = "0.7.8", path = "./crates/puniyu_command_parser" }

puniyu_command = { version = "0.7.10", path = "./crates/puniyu_command" }

puniyu_server_core = { version = "0.7.8", path = "./crates/puniyu_server_core" }
puniyu_server = { version = "0.7.8", path = "./crates/puniyu_server", default-features = false }

puniyu_task = { version = "0.7.8", path = "./crates/puniyu_task" }
puniyu_hook = { version = "0.7.8", path = "./crates/puniyu_hook" }
puniyu_handler = { version = "0.7.8", path = "./crates/puniyu_handler" }

puniyu_plugin = { version = "0.7.8", path = "./crates/puniyu_plugin" }

puniyu_loader = { version = "0.7.8", path = "./crates/puniyu_loader" }


[profile.release]
lto = "thin"
incremental = false

[profile.dev]
incremental = true
