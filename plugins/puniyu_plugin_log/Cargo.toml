[package]
name = "puniyu_plugin_log"
version = "0.9.5"
authors.workspace = true
license.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[features]
default = ["event_log", "access_log"]
event_log = [
    "dep:puniyu_core",
    "dep:puniyu_element",
    "dep:puniyu_event",
    "dep:puniyu_middleware",
    "dep:puniyu_plugin_event_bus",
    "dep:puniyu_logger",
]
access_log = [
    "dep:salvo",
    "dep:client-ip",
    "dep:puniyu_server",
    "dep:puniyu_logger",
]

[dependencies]
log.workspace = true
async-trait.workspace = true
semver.workspace = true

# access_log
salvo = { workspace = true, optional = true }
client-ip = { version = "0.2.1", optional = true }
puniyu_server = { workspace = true, optional = true }

# event_log
puniyu_core = { workspace = true, optional = true }
puniyu_element = { workspace = true, optional = true }
puniyu_event = { workspace = true, optional = true }
puniyu_middleware = { workspace = true, optional = true }
puniyu_plugin_event_bus = { workspace = true, optional = true }

# always required
puniyu_app.workspace = true
puniyu_path.workspace = true
puniyu_config.workspace = true
puniyu_api.workspace = true
puniyu_logger = { workspace = true, optional = true }
puniyu_context.workspace = true
puniyu_error.workspace = true
puniyu_plugin_core.workspace = true
